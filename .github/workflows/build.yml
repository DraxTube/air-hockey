name: Build NDS Rom

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Project
        run: make
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AirHockeyNDS
          path: "*.nds"
