name: Build NDS

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install NDS dependencies
        run: dkp-pacman -Sy --noconfirm calico libnds

      - name: Debug - List calico files
        run: find /opt/devkitpro/calico -type f | sort

      - name: Build
        run: make

      - uses: actions/upload-artifact@v4
        with:
          name: airhockey-nds
          path: airhockey.nds
